version: "2"
sql:
  - engine: "sqlite"
    # NOTE (W12-03): this is an explicit file list, not the whole
    # "kahyad/migrations" directory, because sqlc's sqlite grammar cannot
    # parse the FTS5/vec0 virtual-table DDL in 0002_fts_vec.sql at all
    # ("extraneous input '=' expecting {')', ','}" on tokenize='trigram'
    # and on vec0's distance_metric=cosine / FLOAT[512] syntax - confirmed
    # empirically, not a guess). Nothing needs sqlc for those three virtual
    # tables anyway: kahyad/internal/search writes/reads them with
    # hand-written SQL. Add each FUTURE plain-table migration file here by
    # name; skip any migration file that (like 0002) only contains virtual
    # table DDL sqlc can't parse.
    schema:
      - "kahyad/migrations/0001_init_schema.sql"
      # 0003 (W3-02) is plain tables only (no FTS5/vec0 syntax), so unlike
      # 0002 it parses fine and has real sqlc-generated queries below.
      - "kahyad/migrations/0003_autonomy_policy.sql"
      # 0004 (W3-05) is a plain table too (egress_budget) - same reasoning.
      - "kahyad/migrations/0004_egress_budget.sql"
      # 0005 (W3-06) is a plain ALTER TABLE (pending_approvals.tool_input) -
      # same reasoning.
      - "kahyad/migrations/0005_pending_approval_payload.sql"
      # 0006 (W3-08) is two plain ALTER TABLE statements (tasks.lane,
      # tasks.secret_category) - same reasoning.
      - "kahyad/migrations/0006_secret_lane.sql"
      # 0007 (W4-02) is plain ALTER TABLE + CREATE TABLE/INDEX statements
      # (tasks.status/next_retry_at/attempts, tool_calls, outbox lease
      # columns) - same reasoning.
      - "kahyad/migrations/0007_task_durability.sql"
      # 0008 (W4-02 BLOCKER 1 fix) is a plain CREATE UNIQUE INDEX - same
      # reasoning.
      - "kahyad/migrations/0008_tool_calls_live_unique.sql"
      # 0009 (W4-03) is a plain CREATE TABLE (session_taint) - same
      # reasoning.
      - "kahyad/migrations/0009_session_taint.sql"
      # 0010 (W4-05) is two plain CREATE TABLEs (ledger_digest_state,
      # anchor_log) - same reasoning.
      - "kahyad/migrations/0010_ledger_anchor.sql"
      # 0011 (W5-02) is a plain ALTER TABLE (episodes.cooled_at) + a plain
      # CREATE INDEX - same reasoning.
      - "kahyad/migrations/0011_consolidation.sql"
    queries: "kahyad/internal/store/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "kahyad/internal/store/sqlcgen"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
