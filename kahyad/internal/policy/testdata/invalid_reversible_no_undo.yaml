# Same as valid.yaml, but memory_write is reversible: true with no undo
# recipe at all.
tools:
  - name: memory_write
    class: W1
    reversible: true

secret_lane_globs:
  - "~/Kahya/memory/finans*.md"
  - "~/Documents/saglik/**"
  - "~/Documents/kimlik/**"

fs_write_deny_globs:
  - "~/.zshrc"
  - "~/.zprofile"
  - "~/.zshenv"
  - "~/.bashrc"
  - "~/.bash_profile"
  - "~/.profile"
  - "~/Library/LaunchAgents/**"
  - "~/.hammerspoon/**"
  - "~/Library/Application Support/Kahya/**"

egress:
  allowlist:
    - host: api.anthropic.com
  default_daily_byte_budget: 26214400
